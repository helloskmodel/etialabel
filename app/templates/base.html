<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}特种标签产品数据库{% endblock %}</title>
<style>
  :root { --pri:#0b5ea8; --bg:#f4f6f9; --line:#dde3ea; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:"Microsoft YaHei",system-ui,sans-serif; background:var(--bg); color:#1c2733; font-size:14px; }
  header { background:var(--pri); color:#fff; padding:10px 20px; display:flex; align-items:center; gap:24px; }
  header h1 { font-size:17px; margin:0; }
  header a { color:#cfe3f5; text-decoration:none; }
  header a.on, header a:hover { color:#fff; font-weight:bold; }
  main { max-width:1280px; margin:16px auto; padding:0 16px; }
  .card { background:#fff; border:1px solid var(--line); border-radius:8px; padding:14px 16px; margin-bottom:14px; }
  .flash { background:#e8f6ea; border:1px solid #9fd7a8; padding:8px 12px; border-radius:6px; margin-bottom:12px; }
  table { width:100%; border-collapse:collapse; }
  th,td { border-bottom:1px solid var(--line); padding:7px 8px; text-align:left; vertical-align:top; }
  th { background:#f0f4f8; white-space:nowrap; }
  .tag { display:inline-block; background:#eef4fb; border:1px solid #c9dcf0; color:#0b5ea8; border-radius:4px; padding:1px 6px; margin:1px 2px 1px 0; font-size:12px; white-space:nowrap; }
  .tag.own { background:#fff3e0; border-color:#f3c98a; color:#a05a00; }
  .btn { display:inline-block; background:var(--pri); color:#fff; border:none; border-radius:6px; padding:7px 16px; cursor:pointer; text-decoration:none; font-size:14px; }
  .btn.sec { background:#fff; color:var(--pri); border:1px solid var(--pri); }
  fieldset { border:1px solid var(--line); border-radius:6px; margin:0 0 10px; padding:8px 10px; }
  legend { font-weight:bold; font-size:13px; padding:0 6px; }
  label.opt { display:inline-block; margin:2px 10px 2px 0; white-space:nowrap; cursor:pointer; }
  input[type=text], input[type=number], select { border:1px solid var(--line); border-radius:5px; padding:6px 8px; }
  .muted { color:#7a8794; font-size:12px; }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  @media (max-width:800px){ .grid2 { grid-template-columns:1fr; } }
</style>
</head>
<body>
<header>
  <h1>ETIA 特种标签统一产品库</h1>
  <nav>
    <a href="{{ url_for('search') }}" class="{{ 'on' if request.endpoint=='search' }}">产品查询</a> &nbsp;|&nbsp;
    <a href="{{ url_for('admin') }}" class="{{ 'on' if request.endpoint=='admin' }}">数据管理（上传/导入）</a>
  </nav>
</header>
<main>
  {% with msgs = get_flashed_messages() %}
    {% for m in msgs %}<div class="flash">{{ m }}</div>{% endfor %}
  {% endwith %}
  {% block body %}{% endblock %}
</main>
</body>
</html>
