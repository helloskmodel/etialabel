<div class="hero">
  <div class="top">
    <div class="logo">ETIA<small>特种标签选型商城</small></div>
    <div class="stats"><span id="stat-total"></span><span id="stat-tds"></span><span>7 大品牌</span></div>
  </div>
  <div class="searchwrap">
    <h1>输入工况或型号,快速找到能用的标签材料</h1>
    <div class="searchbox">
      <input id="kw" type="search" placeholder="试试:聚酰亚胺 / 回流焊 / B-423 / 耐酒精 / 冻存…" autocomplete="off">
      <button class="go" onclick="document.getElementById('kw').dispatchEvent(new Event('input'))">搜 索</button>
    </div>
    <div class="hotwords">热门:
      <button data-hot="聚酰亚胺">聚酰亚胺</button><button data-hot="回流焊">回流焊</button>
      <button data-hot="防拆">防拆</button><button data-hot="冻存">低温冻存</button>
      <button data-hot="铭牌">铭牌</button><button data-hot="线缆">线缆</button>
    </div>
  </div>
</div>

<div class="filterbar"><div class="fcard">
  <div class="frow"><span class="lbl">品牌</span><div class="chips" data-k="brand"></div></div>
  <div class="frow"><span class="lbl">行业</span><div class="chips" data-k="app"></div></div>
  <div class="frow"><span class="lbl">耐高温</span><div class="chips" data-k="ht"></div></div>
  <div class="frow"><span class="lbl">耐低温</span><div class="chips" data-k="lt"></div></div>
  <div class="frow" id="morerow" style="display:none">
    <span class="lbl">面材</span><div class="chips" data-k="face"></div></div>
  <div class="frow" id="morerow2" style="display:none">
    <span class="lbl">胶水</span><div class="chips" data-k="adh"></div></div>
  <div class="frow" id="morerow3" style="display:none">
    <span class="lbl">耐化学</span><div class="chips" data-k="chem"></div>
    <span class="lbl" style="width:auto">资料</span><div class="chips" data-k="tds"></div></div>
  <div class="toolrow">
    <span id="hits"></span>
    <button class="linkbtn" id="morebtn">＋ 更多筛选(面材/胶水/耐化学)</button>
    <span style="flex:1"></span>
    <label style="font-size:13px;color:var(--muted)">耐温 ≥ <input id="tmin" type="number" style="width:76px" placeholder="℃"></label>
    <select id="sort">
      <option value="def">综合排序</option>
      <option value="temp">耐温 高→低</option>
      <option value="brand">按品牌</option>
    </select>
    <button class="linkbtn" id="reset">清空</button>
    <button class="linkbtn" id="csv">导出CSV</button>
  </div>
</div></div>

<div class="grid" id="grid"></div>
<div class="empty" id="empty" style="display:none">没有匹配的产品——换个关键词,或清空部分筛选条件试试。</div>
<button class="loadmore" id="loadmore" style="display:none">加载更多 ▾</button>

<div id="pdp" role="dialog" aria-modal="true"></div>
<footer>ETIA 特种标签统一产品库 · 数据来自各品牌官网/官方TDS/官方选型器,均带溯源链接 · 官网未公布的参数留空不编造 · 2026-07</footer>

<script id="data" type="application/json">__DATA__</script>
<script>
const P = JSON.parse(document.getElementById('data').textContent);
const TIER={T1:'≤80℃',T2:'81~120℃',T3:'121~180℃',T4:'181~260℃',T5:'261~500℃',T6:'>500℃'};
const LT=[[-20,'可达-20℃'],[-40,'可达-40℃'],[-80,'可达-80℃'],[-150,'可达-150℃'],[-196,'可达-196℃(液氮)']];
const HT=[[100,'可达100℃'],[134,'可达134℃(灭菌)'],[150,'可达150℃'],[260,'可达260℃(回流焊)'],[600,'可达600℃'],[800,'可达800℃以上']];
document.getElementById('stat-total').textContent = P.length+' 款材料';
document.getElementById('stat-tds').textContent = P.filter(p=>p.tds).length+' 份官方TDS';
const state={brand:new Set(),app:new Set(),face:new Set(),adh:new Set(),ht:new Set(),chem:new Set(),tds:new Set(),lt:new Set(),kw:'',tmin:''};
const uniq=g=>{const m=new Map();P.forEach(p=>(g(p)||[]).forEach(v=>m.set(v,(m.get(v)||0)+1)));return [...m.entries()].sort((a,b)=>b[1]-a[1])};
const FILTS={
  brand:uniq(p=>[p.bcn||p.bc]),
  app:uniq(p=>(p.ap||'').split(' / ').filter(Boolean)),
  ht:HT.map(([th])=>[th,P.filter(p=>p.t1!=null&&p.t1>=th).length]),
  lt:LT.map(([th])=>[th,P.filter(p=>p.t0!=null&&p.t0<=th).length]),
  face:uniq(p=>p.fc?[p.fc]:[]).slice(0,18),
  adh:uniq(p=>p.ac?[p.ac]:[]),
  chem:['A','B','C','D'].map(c=>[c,P.filter(p=>p.chem===c).length]),
  tds:[['仅看有TDS',P.filter(p=>p.tds).length]],
};
for(const[k,items]of Object.entries(FILTS)){
  const box=document.querySelector(`[data-k="${k}"]`);
  items.forEach(([v,n])=>{ if(!n)return;
    const c=document.createElement('button');c.className='chip';c.type='button';
    const lbl=k==='ht'?HT.find(x=>x[0]==v)[1]:k==='lt'?LT.find(x=>x[0]==v)[1]:v;c.textContent=lbl+(k==='ht'||k==='chem'||k==='lt'?` ·${n}`:'');
    c.onclick=()=>{state[k].has(v)?state[k].delete(v):state[k].add(v);c.classList.toggle('on');render(true)};
    box.appendChild(c); });
}
document.getElementById('morebtn').onclick=e=>{
  const show=document.getElementById('morerow').style.display==='none';
  ['morerow','morerow2','morerow3'].forEach(id=>document.getElementById(id).style.display=show?'flex':'none');
  e.target.textContent=show?'－ 收起筛选':'＋ 更多筛选(面材/胶水/耐化学)';
};
document.getElementById('kw').addEventListener('input',e=>{state.kw=e.target.value.trim().toLowerCase();render(true)});
document.querySelectorAll('[data-hot]').forEach(b=>b.onclick=()=>{
  const i=document.getElementById('kw'); i.value=b.dataset.hot; i.dispatchEvent(new Event('input'));
  document.querySelector('.filterbar').scrollIntoView({behavior:'smooth'});
});
document.getElementById('tmin').oninput=e=>{state.tmin=e.target.value;render(true)};
document.getElementById('sort').onchange=()=>render(true);
document.getElementById('reset').onclick=()=>{
  Object.values(state).forEach(s=>{if(s instanceof Set)s.clear()});state.kw='';state.tmin='';
  document.getElementById('kw').value='';document.getElementById('tmin').value='';
  document.querySelectorAll('.chip.on').forEach(c=>c.classList.remove('on'));render(true);
};
function match(p){
  if(state.brand.size&&!state.brand.has(p.bcn||p.bc))return false;
  if(state.app.size&&![...state.app].some(a=>(p.ap||'').includes(a)))return false;
  if(state.face.size&&!state.face.has(p.fc))return false;
  if(state.adh.size&&!state.adh.has(p.ac))return false;
  if(state.chem.size&&!state.chem.has(p.chem))return false;
  if(state.tds.size&&!p.tds)return false;
  if(state.ht.size){const need=Math.min(...[...state.ht].map(Number));if(!(p.t1!=null&&p.t1>=need))return false;}
  if(state.lt.size){const need=Math.max(...[...state.lt].map(Number));if(!(p.t0!=null&&p.t0<=need))return false;}
  if(state.tmin!==''&&!(p.t1>=+state.tmin))return false;
  if(state.kw){const h=`${p.m} ${p.nc||''} ${p.ne||''} ${p.ft||''} ${p.bn||''} ${p.ds||''} ${p.fc||''} ${p.ac||''} ${p.ap||''}`.toLowerCase();
    if(!h.includes(state.kw))return false}
  return true;
}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function swClass(p){
  const f=(p.fc||'');const col=(p.c||'');
  if(/聚酰亚胺/.test(f))return 'sw-pi';
  if(/防拆|易碎/.test(f))return 'sw-void';
  if(/铝箔|陶瓷|金属/.test(f)||/silver|银/i.test(col))return 'sw-metal';
  if(/纸/.test(f))return 'sw-paper';
  if(/布/.test(f))return 'sw-cloth';
  if(/FOAM|泡/.test(f))return 'sw-foam';
  if(/乙烯基/.test(f))return 'sw-vinyl';
  if(/transparent|clear|透明/i.test(col))return 'sw-clear';
  return 'sw-pet';
}
function barcode(m){
  let h=0;for(let i=0;i<m.length;i++)h=(h*31+m.charCodeAt(i))>>>0;
  let x=4,out='';
  for(let i=0;i<26&&x<96;i++){const w=1+(h>>(i%28)&3);out+=`<rect x="${x}" y="0" width="${w}" height="18" fill="currentColor"/>`;x+=w+2}
  return `<svg viewBox="0 0 100 18" preserveAspectRatio="none">${out}</svg>`;
}
function mockInner(p){
  return `<span class="brandtag">${esc(p.bcn||p.bc)}</span>
    ${p.tier?`<span class="tiercorner" style="background:var(--${p.tier.toLowerCase()})">${p.tier}</span>`:''}
    <div class="label-mock"><div class="mdl">${esc(p.m)}</div>${barcode(p.m)}</div>`;
}
function mock(p){
  return `<div class="sw ${swClass(p)}">${mockInner(p)}</div>`;
}
let CUR=[],shown=0;const PAGE=48;
function render(reset){
  CUR=P.filter(match);
  const s=document.getElementById('sort').value;
  if(s==='temp')CUR.sort((a,b)=>(b.t1??-999)-(a.t1??-999));
  if(s==='brand')CUR.sort((a,b)=>(a.bc+a.m).localeCompare(b.bc+b.m));
  document.getElementById('hits').textContent=`命中 ${CUR.length} / ${P.length} 款`;
  if(reset)shown=0;
  shown=Math.min(CUR.length,shown+PAGE);
  document.getElementById('grid').innerHTML=CUR.slice(0,shown).map((p,i)=>`
    <div class="pcard" tabindex="0" role="button" data-i="${i}">
      ${mock(p)}
      <div class="pinfo">
        <div class="pname">${esc(p.nc||p.ne||p.m)}</div>
        <div class="ptags">
          ${p.fc?`<span class="tag">${esc(p.fc)}</span>`:''}
          ${p.ac?`<span class="tag">${esc(p.ac)}</span>`:''}
          ${p.t1!=null?`<span class="tag temp" style="background:var(--${(p.tier||'t1').toLowerCase()})">耐温${p.t1}℃</span>`:''}
          ${p.chem&&p.chem!=='D'?`<span class="tag temp" style="background:var(--chem${p.chem})">耐化学${p.chem}</span>`:''}
          ${p.t0!=null&&p.t0<=-40?`<span class="tag temp" style="background:#2E6FB0">耐低温${p.t0}℃</span>`:''}
        </div>
        <div class="pfoot">${p.tds?'<span class="tds">✓ 官方TDS</span>':''}<span class="more">查看详情 →</span></div>
      </div>
    </div>`).join('');
  document.getElementById('empty').style.display=CUR.length?'none':'block';
  document.getElementById('loadmore').style.display=shown<CUR.length?'block':'none';
}
document.getElementById('loadmore').onclick=()=>render(false);
document.getElementById('grid').addEventListener('click',e=>{
  const c=e.target.closest('.pcard');if(c)openPDP(CUR[+c.dataset.i]);
});
document.getElementById('grid').addEventListener('keydown',e=>{
  if(e.key==='Enter'){const c=e.target.closest('.pcard');if(c)openPDP(CUR[+c.dataset.i]);}
});
const pdp=document.getElementById('pdp');
function openPDP(p){
  pdp.innerHTML=`<div class="pdp-card">
    <button class="pdp-close" onclick="closePDP()" aria-label="关闭">✕</button>
    <div class="pdp-top">
      <div class="pdp-visual ${swClass(p)}">${mockInner(p)}</div>
      <div class="pdp-main">
        <div class="brand">${esc(p.bcn||p.bc)} · ${esc(p.bc)}</div>
        <h2>${esc(p.m)}</h2>
        <p class="sub">${esc(p.nc||'')}${p.ne?`<br>${esc(p.ne)}`:''}</p>
        <div class="badges">
          ${p.tier?`<span class="pill" style="background:var(--${p.tier.toLowerCase()})">耐温 ${p.tier} ${p.t1!=null?p.t1+'℃':''}</span>`:''}
          ${p.chem?`<span class="pill" style="background:var(--chem${p.chem})">耐化学 ${p.chem}</span>`:''}
          ${(p.ap||'').split(' / ').filter(Boolean).map(a=>`<span class="pill soft">${esc(a)}</span>`).join('')}
        </div>
        <table class="spec">
          <tr><th>面材</th><td>${esc(p.fc||'—')}</td></tr>
          <tr><th>胶水</th><td>${esc(p.ac||'—')}</td></tr>
          <tr><th>长期耐温</th><td>${p.t0!=null?p.t0+' ~ ':''}${p.t1!=null?p.t1+' ℃':'—'}${p.tp!=null?`(峰值 ${p.tp}℃)`:''}</td></tr>
          <tr><th>厚度 / 颜色</th><td>${p.th!=null?p.th+' μm':'—'} / ${esc(p.c||'—')}</td></tr>
          <tr><th>打印方式</th><td>${esc(p.pr||'—')}</td></tr>
          <tr><th>认证</th><td>${esc(p.cert||'—')}</td></tr>
        </table>
        <div class="cta-row">
          ${p.tds?`<a class="cta" href="${esc(p.tds)}" target="_blank" rel="noopener">⬇ 下载官方 TDS</a>`:''}
          ${p.src&&p.src!==p.tds?`<a class="cta sec" href="${esc(p.src)}" target="_blank" rel="noopener">品牌官网源页 ↗</a>`:''}
        </div>
      </div>
    </div>
    <div class="pdp-body">
      ${p.ds?`<div class="blk full"><h4>产品介绍 / 适用工况</h4>${esc(p.ds)}</div>`:''}
      ${p.ft?`<div class="blk"><h4>特性 Feature</h4>${esc(p.ft)}</div>`:''}
      ${p.bn?`<div class="blk"><h4>优势 Benefit</h4>${esc(p.bn)}</div>`:''}
      <div class="blk full" style="color:var(--muted)">耐化学分级:A 耐强溶剂浸泡 / B 耐酒精·汽油·机油 / C 耐水油 / D 官网未声明 · 空白字段=品牌官网未公布(不编造)</div>
    </div>
    <div class="srcline">数据溯源:${esc(p.src||'')}</div>
  </div>`;
  pdp.classList.add('open');document.body.style.overflow='hidden';
}
window.closePDP=()=>{pdp.classList.remove('open');document.body.style.overflow=''};
pdp.addEventListener('click',e=>{if(e.target===pdp)closePDP()});
addEventListener('keydown',e=>{if(e.key==='Escape')closePDP()});
document.getElementById('csv').onclick=()=>{
  const cols=[['品牌','bcn'],['型号','m'],['中文品名','nc'],['英文品名','ne'],['面材','fc'],['胶水','ac'],['行业','ap'],['长期耐温min','t0'],['长期耐温max','t1'],['峰值','tp'],['档位','tier'],['耐化学','chem'],['厚度um','th'],['颜色','c'],['打印','pr'],['认证','cert'],['TDS','tds'],['来源','src']];
  const q=v=>`"${String(v??'').replace(/"/g,'""')}"`;
  const csv='﻿'+cols.map(c=>c[0]).join(',')+'\n'+CUR.map(p=>cols.map(c=>q(p[c[1]])).join(',')).join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download='ETIA产品筛选导出.csv';a.click();URL.revokeObjectURL(a.href);
};
render(true);
</script>
