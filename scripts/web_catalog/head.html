<title>ETIA 特种标签产品库</title>
<style>
:root{
  --bg:#F2F4F7; --surface:#FFFFFF; --surface2:#F7F9FB; --ink:#1B2733; --muted:#5D6E80;
  --line:#DCE3EA; --accent:#14588F; --accent-ink:#FFFFFF; --accent-soft:#E8F0F8;
  --t1:#6D97BB; --t2:#4E86B4; --t3:#B98A2E; --t4:#C06A2A; --t5:#B5482A; --t6:#8E2323;
  --chemA:#2E7D4F; --chemB:#5C8A3A; --chemC:#9A8A34; --chemD:#8A94A0;
}
@media (prefers-color-scheme: dark){:root{
  --bg:#0F161E; --surface:#18222D; --surface2:#141D27; --ink:#E3EBF3; --muted:#93A4B5;
  --line:#2A3846; --accent:#5BA3E0; --accent-ink:#0C1621; --accent-soft:#1D3348;
  --t1:#7FA8CB; --t2:#6FA0CE; --t3:#D3A54A; --t4:#D98A4D; --t5:#D06A4F; --t6:#C25050;
  --chemA:#5CB585; --chemB:#8FB868; --chemC:#C4B45E; --chemD:#7E8B98;
}}
:root[data-theme="dark"]{
  --bg:#0F161E; --surface:#18222D; --surface2:#141D27; --ink:#E3EBF3; --muted:#93A4B5;
  --line:#2A3846; --accent:#5BA3E0; --accent-ink:#0C1621; --accent-soft:#1D3348;
  --t1:#7FA8CB; --t2:#6FA0CE; --t3:#D3A54A; --t4:#D98A4D; --t5:#D06A4F; --t6:#C25050;
  --chemA:#5CB585; --chemB:#8FB868; --chemC:#C4B45E; --chemD:#7E8B98;
}
:root[data-theme="light"]{
  --bg:#F2F4F7; --surface:#FFFFFF; --surface2:#F7F9FB; --ink:#1B2733; --muted:#5D6E80;
  --line:#DCE3EA; --accent:#14588F; --accent-ink:#FFFFFF; --accent-soft:#E8F0F8;
  --t1:#6D97BB; --t2:#4E86B4; --t3:#B98A2E; --t4:#C06A2A; --t5:#B5482A; --t6:#8E2323;
  --chemA:#2E7D4F; --chemB:#5C8A3A; --chemC:#9A8A34; --chemD:#8A94A0;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.55 "PingFang SC","Hiragino Sans GB","Microsoft YaHei",system-ui,sans-serif}
header{position:sticky;top:0;z-index:30;background:var(--surface);border-bottom:1px solid var(--line);padding:10px 18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
header h1{font-size:17px;margin:0;letter-spacing:.02em}
header h1 b{color:var(--accent)}
#hits{color:var(--muted);font-variant-numeric:tabular-nums}
.btn{background:var(--accent);color:var(--accent-ink);border:none;border-radius:6px;padding:7px 14px;font-size:13px;cursor:pointer}
.btn.sec{background:transparent;color:var(--accent);border:1px solid var(--accent)}
.btn:focus-visible,input:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.wrap{display:flex;gap:14px;max-width:1500px;margin:14px auto;padding:0 14px;align-items:flex-start}
aside{width:250px;flex:none;position:sticky;top:62px;max-height:calc(100vh - 76px);overflow-y:auto;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:12px 14px}
aside h3{font-size:12px;letter-spacing:.08em;color:var(--muted);margin:14px 0 6px;text-transform:uppercase}
aside h3:first-child{margin-top:0}
.chips{display:flex;flex-wrap:wrap;gap:5px}
.chip{border:1px solid var(--line);background:var(--surface2);border-radius:20px;padding:2px 10px;font-size:12.5px;cursor:pointer;user-select:none;color:var(--ink)}
.chip.on{background:var(--accent);border-color:var(--accent);color:var(--accent-ink)}
.kw{width:100%;padding:7px 9px;border:1px solid var(--line);border-radius:6px;background:var(--surface2);color:var(--ink);font-size:13px}
main{flex:1;min-width:0}
.tablebox{background:var(--surface);border:1px solid var(--line);border-radius:10px;overflow-x:auto}
table{width:100%;border-collapse:collapse;font-variant-numeric:tabular-nums}
th{position:sticky;top:0;background:var(--surface2);font-size:12px;color:var(--muted);text-align:left;padding:8px 10px;border-bottom:1px solid var(--line);white-space:nowrap}
td{padding:7px 10px;border-bottom:1px solid var(--line);vertical-align:top}
tbody tr{cursor:pointer}
tbody tr:hover{background:var(--accent-soft)}
.model{font-weight:600;color:var(--accent);white-space:nowrap}
.mut{color:var(--muted);font-size:12.5px}
.pill{display:inline-block;border-radius:4px;padding:0 7px;font-size:11.5px;line-height:19px;color:#fff;white-space:nowrap}
.tag{display:inline-block;border:1px solid var(--line);background:var(--surface2);border-radius:4px;padding:0 6px;font-size:11.5px;line-height:19px;margin:1px 3px 1px 0;white-space:nowrap}
#drawer{position:fixed;top:0;right:-620px;width:min(620px,96vw);height:100vh;background:var(--surface);border-left:1px solid var(--line);z-index:40;transition:right .25s;overflow-y:auto;padding:20px 22px}
@media (prefers-reduced-motion: reduce){#drawer{transition:none}}
#drawer.open{right:0;box-shadow:-12px 0 40px rgba(0,0,0,.25)}
#mask{position:fixed;inset:0;background:rgba(10,18,26,.45);z-index:35;display:none}
#mask.on{display:block}
#drawer h2{margin:0 0 2px;font-size:21px;text-wrap:balance}
#drawer .sub{color:var(--muted);margin:0 0 10px}
.spec{width:100%;border:1px solid var(--line);border-radius:8px;border-collapse:separate;border-spacing:0;margin:12px 0}
.spec th{width:96px;background:var(--surface2);font-weight:600;color:var(--muted);position:static}
.spec td,.spec th{padding:6px 10px;border-bottom:1px solid var(--line);font-size:13px}
.spec tr:last-child td,.spec tr:last-child th{border-bottom:none}
.blk{background:var(--surface2);border-radius:8px;padding:10px 12px;margin:10px 0;font-size:13px}
.blk b{color:var(--accent)}
footer{max-width:1500px;margin:10px auto 30px;padding:0 14px;color:var(--muted);font-size:12px}
@media (max-width:860px){.wrap{flex-direction:column}aside{position:static;width:100%;max-height:none}}
a{color:var(--accent)}
</style>
