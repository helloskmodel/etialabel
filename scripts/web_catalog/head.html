<title>ETIA 特种标签选型商城</title>
<style>
:root{
  --bg:#EEF2F6; --surface:#FFFFFF; --surface2:#F6F8FB; --ink:#17222D; --muted:#5F7183;
  --line:#DCE4EC; --accent:#0F5C97; --accent2:#0A4675; --accent-ink:#FFFFFF; --accent-soft:#E7F0F8;
  --cta:#E8890C; --cta-ink:#FFFFFF;
  --t1:#6D97BB; --t2:#4E86B4; --t3:#B98A2E; --t4:#C06A2A; --t5:#B5482A; --t6:#8E2323;
  --chemA:#2E7D4F; --chemB:#5C8A3A; --chemC:#9A8A34; --chemD:#8A94A0;
  --shadow:0 1px 3px rgba(23,34,45,.08),0 6px 18px rgba(23,34,45,.07);
  --shadow-lg:0 8px 40px rgba(23,34,45,.22);
}
@media (prefers-color-scheme: dark){:root{
  --bg:#0D141C; --surface:#161F2A; --surface2:#121B25; --ink:#E4EBF2; --muted:#8FA1B3;
  --line:#283644; --accent:#5BA3E0; --accent2:#3D8BD4; --accent-ink:#0C1621; --accent-soft:#1C3349;
  --cta:#F5A63C; --cta-ink:#231607;
  --t1:#7FA8CB; --t2:#6FA0CE; --t3:#D3A54A; --t4:#D98A4D; --t5:#D06A4F; --t6:#C25050;
  --chemA:#5CB585; --chemB:#8FB868; --chemC:#C4B45E; --chemD:#7E8B98;
  --shadow:0 1px 3px rgba(0,0,0,.4),0 6px 18px rgba(0,0,0,.35);
  --shadow-lg:0 8px 40px rgba(0,0,0,.6);
}}
:root[data-theme="dark"]{
  --bg:#0D141C; --surface:#161F2A; --surface2:#121B25; --ink:#E4EBF2; --muted:#8FA1B3;
  --line:#283644; --accent:#5BA3E0; --accent2:#3D8BD4; --accent-ink:#0C1621; --accent-soft:#1C3349;
  --cta:#F5A63C; --cta-ink:#231607;
  --t1:#7FA8CB; --t2:#6FA0CE; --t3:#D3A54A; --t4:#D98A4D; --t5:#D06A4F; --t6:#C25050;
  --chemA:#5CB585; --chemB:#8FB868; --chemC:#C4B45E; --chemD:#7E8B98;
  --shadow:0 1px 3px rgba(0,0,0,.4),0 6px 18px rgba(0,0,0,.35);
  --shadow-lg:0 8px 40px rgba(0,0,0,.6);
}
:root[data-theme="light"]{
  --bg:#EEF2F6; --surface:#FFFFFF; --surface2:#F6F8FB; --ink:#17222D; --muted:#5F7183;
  --line:#DCE4EC; --accent:#0F5C97; --accent2:#0A4675; --accent-ink:#FFFFFF; --accent-soft:#E7F0F8;
  --cta:#E8890C; --cta-ink:#FFFFFF;
  --t1:#6D97BB; --t2:#4E86B4; --t3:#B98A2E; --t4:#C06A2A; --t5:#B5482A; --t6:#8E2323;
  --chemA:#2E7D4F; --chemB:#5C8A3A; --chemC:#9A8A34; --chemD:#8A94A0;
  --shadow:0 1px 3px rgba(23,34,45,.08),0 6px 18px rgba(23,34,45,.07);
  --shadow-lg:0 8px 40px rgba(23,34,45,.22);
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
@media (prefers-reduced-motion:reduce){html{scroll-behavior:auto} *{transition:none!important;animation:none!important}}
body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.6 "PingFang SC","Hiragino Sans GB","Microsoft YaHei",system-ui,sans-serif}
button{font-family:inherit}

/* ---------- 顶栏 + 搜索英雄区 ---------- */
.hero{background:linear-gradient(135deg,var(--accent2) 0%,var(--accent) 78%);color:#fff;padding:26px 20px 84px;position:relative}
.hero .top{max-width:1240px;margin:0 auto;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.logo{font-size:20px;font-weight:800;letter-spacing:.04em}
.logo small{font-weight:400;opacity:.85;margin-left:8px;font-size:13px}
.hero .stats{margin-left:auto;font-size:12.5px;opacity:.9;display:flex;gap:16px;font-variant-numeric:tabular-nums}
.searchwrap{max-width:760px;margin:30px auto 0;text-align:center}
.searchwrap h1{font-size:clamp(19px,3vw,26px);font-weight:700;margin:0 0 16px;text-wrap:balance}
.searchbox{display:flex;background:#fff;border-radius:14px;padding:6px;box-shadow:0 10px 34px rgba(6,32,54,.35)}
.searchbox input{flex:1;border:none;outline:none;font-size:16px;padding:10px 16px;background:transparent;color:#17222D;min-width:0}
.searchbox .go{background:var(--cta);color:var(--cta-ink);border:none;border-radius:10px;padding:10px 26px;font-size:15px;font-weight:700;cursor:pointer;white-space:nowrap}
.hotwords{margin-top:12px;font-size:12.5px;opacity:.92}
.hotwords button{background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.35);color:#fff;border-radius:16px;padding:2px 12px;margin:3px;cursor:pointer;font-size:12.5px}
.hotwords button:hover{background:rgba(255,255,255,.3)}

/* ---------- 筛选条 ---------- */
.filterbar{max-width:1240px;margin:-46px auto 0;padding:0 20px;position:relative;z-index:5}
.fcard{background:var(--surface);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:12px 16px}
.frow{display:flex;align-items:baseline;gap:10px;padding:5px 0;flex-wrap:wrap}
.frow .lbl{flex:none;font-size:12px;color:var(--muted);font-weight:700;width:58px;letter-spacing:.05em}
.chip{border:1px solid var(--line);background:var(--surface2);border-radius:18px;padding:3px 13px;font-size:12.5px;cursor:pointer;user-select:none;color:var(--ink);transition:all .12s}
.chip:hover{border-color:var(--accent)}
.chip.on{background:var(--accent);border-color:var(--accent);color:var(--accent-ink);font-weight:600}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.toolrow{display:flex;align-items:center;gap:12px;border-top:1px solid var(--line);margin-top:8px;padding-top:10px;flex-wrap:wrap}
#hits{font-size:13px;color:var(--muted);font-variant-numeric:tabular-nums}
.toolrow select,.toolrow input[type=number]{border:1px solid var(--line);border-radius:8px;padding:6px 10px;background:var(--surface2);color:var(--ink);font-size:13px}
.linkbtn{background:none;border:none;color:var(--accent);cursor:pointer;font-size:13px;padding:4px 6px}
.linkbtn:hover{text-decoration:underline}

/* ---------- 商品卡片 ---------- */
.grid{max-width:1240px;margin:22px auto;padding:0 20px;display:grid;grid-template-columns:repeat(auto-fill,minmax(258px,1fr));gap:18px}
.pcard{background:var(--surface);border:1px solid var(--line);border-radius:14px;overflow:hidden;cursor:pointer;transition:transform .15s,box-shadow .15s;display:flex;flex-direction:column}
.pcard:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg)}
.pcard:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.sw{height:150px;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden}
.label-mock{width:76%;border-radius:8px;padding:12px 14px 9px;box-shadow:0 4px 14px rgba(10,25,40,.25);transform:rotate(-2.5deg);transition:transform .18s}
.pcard:hover .label-mock{transform:rotate(0deg) scale(1.04)}
.label-mock .mdl{font-weight:800;font-size:16px;letter-spacing:.02em;font-variant-numeric:tabular-nums;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.label-mock svg{display:block;width:100%;height:26px;margin-top:6px;opacity:.85}
/* 材质纹理 */
.sw-pi{background:linear-gradient(140deg,#2E2013,#4A3015)} .sw-pi .label-mock{background:linear-gradient(115deg,#E8A33D,#C97F1D 60%,#E5A741);color:#3A2508}
.sw-pet{background:linear-gradient(140deg,#B9C7D4,#8FA3B5)} .sw-pet .label-mock{background:linear-gradient(115deg,#FFFFFF,#EDF2F6 55%,#FFFFFF);color:#22303D}
.sw-metal{background:linear-gradient(140deg,#3D4854,#242D37)} .sw-metal .label-mock{background:linear-gradient(100deg,#D9DEE3 0%,#AAB4BD 30%,#E8ECEF 52%,#9FA9B2 74%,#D3D8DD 100%);color:#2A343E}
.sw-paper{background:linear-gradient(140deg,#8A7A61,#6B5D48)} .sw-paper .label-mock{background:linear-gradient(115deg,#FBF7EE,#F1EADC);color:#4A4232}
.sw-vinyl{background:linear-gradient(140deg,#5E7A93,#41586E)} .sw-vinyl .label-mock{background:linear-gradient(115deg,#F4F7F9,#E4EAEF);color:#2C3A47}
.sw-cloth{background:linear-gradient(140deg,#54626E,#3B4750)} .sw-cloth .label-mock{background:repeating-linear-gradient(45deg,#EFEAE0 0 3px,#E3DccC 3px 6px);background-color:#EDE8DD;color:#4A4536}
.sw-void{background:linear-gradient(140deg,#7A3B3B,#4E2424)} .sw-void .label-mock{background:linear-gradient(115deg,#FDFDFD,#F0F0F0);color:#8E2323;position:relative}
.sw-clear{background:linear-gradient(140deg,#4E86B4,#2F5E88)} .sw-clear .label-mock{background:linear-gradient(115deg,rgba(255,255,255,.85),rgba(235,242,248,.65));backdrop-filter:blur(1px);color:#24455F;border:1px dashed rgba(36,69,95,.4)}
.sw-foam{background:linear-gradient(140deg,#6E7B75,#4C5751)} .sw-foam .label-mock{background:radial-gradient(circle at 20% 30%,#E8E8E4 2px,transparent 2.5px) 0 0/14px 14px,radial-gradient(circle at 70% 60%,#DDDDD8 2px,transparent 2.5px) 7px 7px/14px 14px,#EDEDE8;color:#3F4A44}
.brandtag{position:absolute;top:10px;left:10px;background:rgba(9,26,40,.55);color:#fff;font-size:11px;padding:2px 9px;border-radius:12px;letter-spacing:.03em;backdrop-filter:blur(3px)}
.tiercorner{position:absolute;top:10px;right:10px;color:#fff;font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px}
.pinfo{padding:12px 14px 13px;display:flex;flex-direction:column;gap:7px;flex:1}
.pname{font-size:14px;font-weight:650;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:39px}
.ptags{display:flex;flex-wrap:wrap;gap:4px}
.tag{display:inline-block;border:1px solid var(--line);background:var(--surface2);border-radius:5px;padding:0 7px;font-size:11.5px;line-height:20px;color:var(--muted);white-space:nowrap}
.tag.temp{color:#fff;border:none}
.pfoot{margin-top:auto;display:flex;align-items:center;gap:8px;padding-top:4px}
.pfoot .tds{font-size:12px;color:var(--chemA);font-weight:600}
.pfoot .more{margin-left:auto;font-size:12.5px;color:var(--accent);font-weight:600}
.loadmore{display:block;margin:6px auto 40px;background:var(--surface);border:1px solid var(--accent);color:var(--accent);border-radius:10px;padding:10px 44px;font-size:14px;cursor:pointer}
.loadmore:hover{background:var(--accent-soft)}
.empty{max-width:1240px;margin:60px auto;text-align:center;color:var(--muted)}

/* ---------- 产品Landing Page(覆盖层) ---------- */
#pdp{position:fixed;inset:0;z-index:50;display:none;overflow-y:auto;background:rgba(10,20,30,.55);backdrop-filter:blur(3px);padding:4vh 16px}
#pdp.open{display:block}
.pdp-card{max-width:980px;margin:0 auto;background:var(--surface);border-radius:18px;box-shadow:var(--shadow-lg);overflow:hidden}
.pdp-top{display:grid;grid-template-columns:minmax(280px,42%) 1fr}
.pdp-visual{position:relative;display:flex;align-items:center;justify-content:center;min-height:340px}
.pdp-visual .label-mock{width:72%;transform:rotate(-2deg);padding:20px 22px 16px}
.pdp-visual .label-mock .mdl{font-size:22px}
.pdp-visual .label-mock svg{height:40px;margin-top:12px}
.pdp-main{padding:26px 30px 22px;min-width:0}
.pdp-main .brand{color:var(--muted);font-size:13px;letter-spacing:.04em}
.pdp-main h2{margin:2px 0 2px;font-size:24px;text-wrap:balance}
.pdp-main .sub{color:var(--muted);font-size:13px;margin:0 0 12px;word-break:break-word}
.badges{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.pill{display:inline-block;border-radius:6px;padding:2px 10px;font-size:12px;font-weight:600;color:#fff;white-space:nowrap}
.pill.soft{background:var(--accent-soft);color:var(--accent)}
.cta-row{display:flex;gap:10px;flex-wrap:wrap;margin:16px 0 4px}
.cta{background:var(--cta);color:var(--cta-ink);border:none;border-radius:10px;padding:11px 26px;font-size:15px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-block}
.cta:hover{filter:brightness(1.06)}
.cta.sec{background:transparent;color:var(--accent);border:1.5px solid var(--accent);font-weight:600}
.spec{width:100%;border-collapse:collapse;margin-top:6px}
.spec th{width:92px;text-align:left;color:var(--muted);font-weight:600;font-size:12.5px;padding:7px 10px 7px 0;border-bottom:1px solid var(--line);vertical-align:top;white-space:nowrap}
.spec td{padding:7px 0;border-bottom:1px solid var(--line);font-size:13.5px}
.spec tr:last-child th,.spec tr:last-child td{border-bottom:none}
.pdp-body{padding:6px 30px 26px;display:grid;grid-template-columns:1fr 1fr;gap:14px}
.blk{background:var(--surface2);border:1px solid var(--line);border-radius:10px;padding:12px 15px;font-size:13px}
.blk h4{margin:0 0 6px;font-size:13px;color:var(--accent)}
.blk.full{grid-column:1/-1}
.pdp-close{position:sticky;top:0;float:right;margin:14px 16px 0 0;background:var(--surface);border:1px solid var(--line);border-radius:50%;width:38px;height:38px;font-size:17px;cursor:pointer;color:var(--ink);box-shadow:var(--shadow);z-index:2}
.srcline{color:var(--muted);font-size:11.5px;padding:0 30px 20px;word-break:break-all}
footer{max-width:1240px;margin:8px auto 34px;padding:0 20px;color:var(--muted);font-size:12px;text-align:center}
@media (max-width:760px){.pdp-top{grid-template-columns:1fr}.pdp-visual{min-height:240px}.pdp-body{grid-template-columns:1fr}.hero{padding-bottom:96px}}
</style>
